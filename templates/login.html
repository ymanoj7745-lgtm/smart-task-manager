{% extends "base.html" %}
{% block title %}Login — Tackl{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon logo-spin">✅</span>
      <h1>Tackl</h1>
    </div>
    <h2>Welcome back</h2>
    <p class="auth-subtitle">Sign in to manage your tasks</p>

    <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required/>
      </div>
      <button type="submit" class="btn btn--primary btn--full">Sign In</button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="{{ url_for('auth.register') }}">Register</a></p>
  </div>
</div>
{% endblock %}
