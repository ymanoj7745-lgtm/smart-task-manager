{% extends "base.html" %}
{% block title %}Dashboard — Tackl{% endblock %}

{% block content %}
<div class="app-layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar__logo">
      <span class="logo-icon">✅</span>
      <span>Tackl</span>
    </div>
    <nav class="sidebar__nav">
      <a href="#" class="nav-link active" onclick="showSection('tasks')">📋 My Tasks</a>
      <a href="#" class="nav-link"        onclick="showSection('analytics')">📊 Analytics</a>
    </nav>
    <div class="sidebar__footer">
      <span class="user-badge">👤 {{ user.username }}</span>
      <a href="{{ url_for('auth.logout') }}" class="btn btn--ghost btn--sm">Logout</a>
    </div>
  </aside>

  <!-- ── Main content ── -->
  <main class="main-content">

    <!-- Live badge -->
    <div class="live-badge" id="liveBadge">
      <span class="live-dot"></span> Live
    </div>

    <!-- Notification toast -->
    <div class="toast" id="toast"></div>

    <!-- ════════════ TASKS SECTION ════════════ -->
    <section id="section-tasks">
      <div class="section-header">
        <h2>My Tasks</h2>
        <button class="btn btn--primary" onclick="openModal()">+ Add Task</button>
      </div>

      <!-- Filters -->
      <div class="filters">
        <select id="filterStatus" onchange="loadTasks()">
          <option value="">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="in_progress">In Progress</option>
          <option value="completed">Completed</option>
        </select>
        <select id="filterPriority" onchange="loadTasks()">
          <option value="">All Priorities</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </div>

      <!-- Task list -->
      <div class="task-grid" id="taskGrid">
        <div class="empty-state">Loading tasks…</div>
      </div>
    </section>

    <!-- ════════════ ANALYTICS SECTION ════════════ -->
    <section id="section-analytics" style="display:none;">
      <div class="section-header">
        <h2>Analytics Overview</h2>
        <button class="btn btn--ghost btn--sm" onclick="loadAnalytics()">↻ Refresh</button>
      </div>

      <div class="analytics-grid" id="analyticsGrid">
        <div class="empty-state">Loading analytics…</div>
      </div>
    </section>

  </main>
</div>

<!-- ── Add / Edit Task Modal ── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <h3 id="modalTitle">Add New Task</h3>
    <input type="hidden" id="editTaskId"/>

    <div class="form-group">
      <label>Title <span class="required">*</span></label>
      <input type="text" id="taskTitle" placeholder="Task title"/>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="taskDesc" rows="3" placeholder="Optional description"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Priority</label>
        <select id="taskPriority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>
      <div class="form-group" id="statusGroup" style="display:none;">
        <label>Status</label>
        <select id="taskStatus">
          <option value="pending">Pending</option>
          <option value="in_progress">In Progress</option>
          <option value="completed">Completed</option>
        </select>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn--ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn--primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
<script src="{{ url_for('static', filename='js/confetti.js') }}"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script src="{{ url_for('static', filename='js/particles.js') }}"></script>
{% endblock %}
