{% extends "base.html" %}
{% block title %}Register — TaskFlow{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">✅</span>
      <h1>TaskFlow</h1>
    </div>
    <h2>Create account</h2>
    <p class="auth-subtitle">Start managing your tasks today</p>

    <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Choose a username" required autofocus/>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Create a password" required/>
      </div>
      <button type="submit" class="btn btn--primary btn--full">Create Account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
  </div>
</div>
{% endblock %}
